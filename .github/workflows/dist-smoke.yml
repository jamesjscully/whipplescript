name: Dist Smoke

on:
  workflow_call:
    inputs:
      plan:
        required: true
        type: string

jobs:
  packaged-linux-x64:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - name: Download local release artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: artifacts-build-local-*
          path: target/distrib/
          merge-multiple: true
      - name: Smoke packaged Linux x64 binary
        run: scripts/check-dist-archive.sh target/distrib/whipplescript-x86_64-unknown-linux-gnu.tar.xz
