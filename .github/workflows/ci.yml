name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  checks:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Install Maude
        run: |
          sudo apt-get update
          sudo apt-get install -y maude

      - name: Install Nix
        uses: cachix/install-nix-action@v31

      - name: Format
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Rust tests
        run: cargo test --workspace

      - name: Formal model checks
        run: scripts/check-formal-models.sh

      - name: TLA model checks
        run: scripts/check-tla-models.sh

      - name: E2E smoke
        run: scripts/check-e2e.sh

      - name: Release readiness
        run: scripts/check-release-readiness.sh

      - name: Upload readiness reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: readiness-reports
          path: |
            target/release-readiness-report.md
            target/real-provider-smoke-report.md
            target/loft-handoff-report.md
