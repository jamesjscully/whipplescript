name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  checks:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Format
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Rust tests
        # The policy-denial e2e iterates the codex/claude/pi adapters and
        # needs the codex and pi CLIs on PATH; hosted runners don't have
        # them (it runs in the working repo's local gate, where they do).
        run: cargo test --workspace -- --skip dev_native_provider_records_policy_denial_from_source_required_capabilities

      - name: Example programs compile
        run: |
          cargo build -p whipplescript
          for example in examples/*.whip; do
            # Multi-workflow examples need an explicit root; use the first
            # declared workflow.
            root=$(grep -m1 '^workflow ' "$example" | awk '{print $2}')
            ./target/debug/whip check "$example" --root "$root"
          done
