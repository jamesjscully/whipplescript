site_name: WhippleScript
site_description: Durable coordination language for multi-agent workflows.
site_url: https://docs.whipplescript.com/
repo_url: https://github.com/jamesjscully/whipplescript
repo_name: jamesjscully/whipplescript
docs_dir: docs
site_dir: site
strict: true

theme:
  name: material
  logo: assets/logo.svg
  favicon: assets/favicon.svg
  font:
    text: Figtree
    code: Inconsolata
  palette:
    # Navy-led by default (ecosystem-aligned); light is a toggle.
    - scheme: slate
      primary: black
      accent: blue
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
    - scheme: default
      primary: black
      accent: blue
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
  features:
    - navigation.sections
    - navigation.top
    - navigation.tracking
    - navigation.indexes
    - toc.follow
    - content.code.copy
    - search.suggest
    - search.highlight
  icon:
    repo: fontawesome/brands/github

extra:
  # Clicking the logo / site title goes to the marketing landing, not the docs home.
  homepage: https://whipplescript.com/

extra_css:
  - assets/brand.css

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.superfences
  - pymdownx.details

nav:
  - Home: README.md
  - Agent Guide: agent-guide.md
  - Learn:
      - Quickstart: quickstart.md
      - Concepts: concepts.md
      - Tutorial: tutorial.md
      - Authoring Manual: manual.md
      - Examples: examples.md
  - Reference:
      - Language Reference: language-reference.md
      - CLI Reference: api-reference.md
      - JSON Reference: json-reference.md
      - Rust API Reference: rust-api.md
      - Runtime & Operations: runtime-operations.md
      - Providers & packages: providers.md
  - Help:
      - Install: install.md
      - Diagnostics Guide: diagnostics.md
      - Troubleshooting: troubleshooting.md
      - Current State: current-state.md
