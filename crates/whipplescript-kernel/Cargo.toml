[package]
name = "whipplescript-kernel"
version.workspace = true
edition.workspace = true
license.workspace = true
description = "Runtime kernel and provider integrations for WhippleScript workflows"
homepage.workspace = true
repository.workspace = true
readme.workspace = true

[dependencies]
whipplescript-core = { version = "0.1.0", path = "../whipplescript-core" }
whipplescript-parser = { version = "0.1.0", path = "../whipplescript-parser" }
whipplescript-store = { version = "0.1.0", path = "../whipplescript-store" }
serde_json = "1"

[features]
# The delegating provider adapters are optional (DR-0024): the owned brokered
# harness is the built-in path; Codex/Claude are opt-in. Default-on preserves
# current behavior; build with `--no-default-features` to exclude them.
default = ["codex", "claude"]
codex = []
claude = []

[lib]
path = "src/lib.rs"

[lints]
workspace = true
